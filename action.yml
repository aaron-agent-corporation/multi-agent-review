name: Multi-Agent PR Review
description: Run the MAR multi-agent pull request review protocol from a target repository.

inputs:
  pr:
    description: Pull request number, URL, or gh selector to review.
    required: true
  post:
    description: Post the unified review back to GitHub.
    required: false
    default: "true"
  mode:
    description: MAR execution mode, either autonomous or gated.
    required: false
    default: autonomous
  preflight:
    description: Run `mar preflight` before reviewing.
    required: false
    default: "true"
  notify-webhook-url:
    description: Trusted MAR completion relay URL.
    required: false
    default: ""
  notify-webhook-token:
    description: Optional bearer token for the MAR completion relay.
    required: false
    default: ""
  notify-kind:
    description: Trusted fallback notification kind used when the PR has no marker or trailer.
    required: false
    default: claude-code-channel
  notify-target:
    description: Trusted fallback notification target used when the PR has no marker or trailer.
    required: false
    default: default
  github-token:
    description: GitHub token used by gh to read and post pull request reviews.
    required: true

runs:
  using: composite
  steps:
    - name: Check out target repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install MAR dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci

    - name: Build MAR CLI
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm run build

    - name: Run PR review
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        MAR_NOTIFY_WEBHOOK_URL: ${{ inputs.notify-webhook-url }}
        MAR_NOTIFY_WEBHOOK_TOKEN: ${{ inputs.notify-webhook-token }}
        MAR_NOTIFY_KIND: ${{ inputs.notify-kind }}
        MAR_NOTIFY_TARGET: ${{ inputs.notify-target }}
        MAR_CONFIG: ${{ github.action_path }}/mar.config.json
        MAR_MODE: ${{ inputs.mode }}
        POST_REVIEW: ${{ inputs.post }}
        PREFLIGHT: ${{ inputs.preflight }}
        PR_SELECTOR: ${{ inputs.pr }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -uo pipefail

        pr_number=""
        status_sha=""
        status_context="MAR multi-agent review"
        comment_marker="<!-- mar-review-status -->"

        set_mar_status() {
          local state="$1"
          local description="$2"
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${status_sha}" \
            -f "state=${state}" \
            -f "context=${status_context}" \
            -f "description=${description}" \
            -f "target_url=${RUN_URL}" \
            >/dev/null
        }

        find_status_comment_id() {
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
            --jq ".[] | select(.body | startswith(\"${comment_marker}\")) | .id" \
            | tail -n 1
        }

        post_success_comment() {
          if [[ -z "$pr_number" ]]; then
            return 0
          fi

          local comment_id
          comment_id="$(find_status_comment_id)"
          if [[ -z "$comment_id" ]]; then
            return 0
          fi

          local body_file="${RUNNER_TEMP:-/tmp}/mar-success-comment-${GITHUB_RUN_ID:-$$}.md"
          cat > "$body_file" <<EOF
        ${comment_marker}
        ## MAR multi-agent review completed

        The latest MAR workflow completed and posted a unified PR review.

        - Workflow run: ${RUN_URL}
        - Status context: ${status_context}
        EOF

          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
            -F "body=@${body_file}" \
            >/dev/null
        }

        post_failure_comment() {
          local code="$1"
          if [[ -z "$pr_number" ]]; then
            return 0
          fi

          local body_file="${RUNNER_TEMP:-/tmp}/mar-failure-comment-${GITHUB_RUN_ID:-$$}.md"
          cat > "$body_file" <<EOF
        ${comment_marker}
        ## MAR multi-agent review failed

        The MAR workflow did not complete, so a unified PR review was not posted.

        - Workflow run: ${RUN_URL}
        - Exit code: ${code}
        - Status context: ${status_context}

        What to do next:
        1. Open the workflow run logs.
        2. Inspect the \`Run PR review\` step for the failing phase and agent.
        3. Fix the reported CLI auth, roster, permission, or validation issue.
        4. Re-run the workflow from Actions, or push a new commit to this PR.
        EOF

          local comment_id
          comment_id="$(find_status_comment_id)"

          if [[ -n "$comment_id" ]]; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              -F "body=@${body_file}" \
              >/dev/null
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
              -F "body=@${body_file}" \
              >/dev/null
          fi
        }

        post_completion_notification() {
          local state="$1"
          node "${GITHUB_ACTION_PATH}/dist/src/cli.js" pr notify "${PR_SELECTOR}" \
            --status "${state}" \
            --run-url "${RUN_URL}" \
            --status-context "${status_context}" \
            --repository "${GITHUB_REPOSITORY}"
        }

        finish_status() {
          local code=$?
          if [[ -n "$status_sha" ]]; then
            if [[ "$code" -eq 0 ]]; then
              set_mar_status success "MAR multi-agent review completed" || true
              post_success_comment || echo "::warning::Unable to update MAR status comment. Add 'issues: write' to workflow permissions."
              post_completion_notification success || echo "::warning::Unable to send MAR completion notification."
            else
              set_mar_status failure "MAR multi-agent review failed" || true
              post_failure_comment "$code" || echo "::warning::Unable to post MAR failure comment. Add 'issues: write' to workflow permissions."
              post_completion_notification failure || echo "::warning::Unable to send MAR completion notification."
            fi
          fi
          exit "$code"
        }

        pr_number="$(gh pr view "$PR_SELECTOR" --json number --jq .number)"
        status_sha="$(gh pr view "$PR_SELECTOR" --json headRefOid --jq .headRefOid)"
        if [[ -z "$pr_number" || -z "$status_sha" ]]; then
          echo "::error::Unable to resolve PR number or head SHA for selector: $PR_SELECTOR"
          exit 2
        fi

        trap 'exit 130' INT
        trap 'exit 143' TERM
        trap finish_status EXIT

        if ! set_mar_status pending "MAR multi-agent review in progress"; then
          echo "::error::Unable to create MAR pending status. Add 'statuses: write' to workflow permissions."
          exit 2
        fi

        set -e

        case "$MAR_MODE" in
          autonomous|gated) ;;
          *) echo "mode must be autonomous or gated, got: $MAR_MODE" >&2; exit 2 ;;
        esac

        if [[ "$PREFLIGHT" == "true" ]]; then
          set +e
          preflight_output="$(node "${GITHUB_ACTION_PATH}/dist/src/cli.js" preflight --config "$MAR_CONFIG" 2>&1)"
          preflight_code=$?
          set -e
          printf '%s\n' "$preflight_output"
          if [[ "$preflight_code" -ne 0 ]]; then
            ready_vendors="$(
              printf '%s\n' "$preflight_output" |
                awk '/responsive \(/ { if (!($2 in vendors)) { vendors[$2]=1; count++ } } END { print count+0 }'
            )"
            if [[ "$ready_vendors" =~ ^[0-9]+$ && "$ready_vendors" -ge 2 ]]; then
              echo "::warning::MAR preflight reported ${ready_vendors} responsive vendor(s); continuing with surviving-agent protocol."
            else
              exit "$preflight_code"
            fi
          fi
        fi

        args=(pr review "$PR_SELECTOR" --config "$MAR_CONFIG" "--$MAR_MODE")
        if [[ "$POST_REVIEW" == "true" ]]; then
          args+=(--post)
        fi

        node "${GITHUB_ACTION_PATH}/dist/src/cli.js" "${args[@]}"
