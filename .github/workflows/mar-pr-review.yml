name: MAR PR Review

on:
  # Do not switch this to pull_request_target: the job invokes local vendor CLIs
  # and runs project install/build scripts on a self-hosted runner.
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number or URL to review
        required: true
        type: string
      post:
        description: Post the unified review back to GitHub
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: mar-pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    name: Multi-agent PR review
    runs-on: self-hosted
    if: ${{ github.event_name != 'pull_request' || (!github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository) }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Resolve PR review mode
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DISPATCH_PR_SELECTOR: ${{ inputs.pr }}
          DISPATCH_POST: ${{ inputs.post }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            printf 'PR_SELECTOR=%s\n' "$PR_NUMBER" >> "$GITHUB_ENV"
            printf 'MAR_POST_REVIEW=true\n' >> "$GITHUB_ENV"
          else
            printf 'PR_SELECTOR=%s\n' "$DISPATCH_PR_SELECTOR" >> "$GITHUB_ENV"
            printf 'MAR_POST_REVIEW=%s\n' "$DISPATCH_POST" >> "$GITHUB_ENV"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Verify agent roster
        run: node dist/src/cli.js preflight

      - name: Run PR review
        shell: bash
        run: |
          if [[ "$MAR_POST_REVIEW" == "true" ]]; then
            node dist/src/cli.js pr review "$PR_SELECTOR" --post --autonomous
          else
            node dist/src/cli.js pr review "$PR_SELECTOR" --autonomous
          fi
